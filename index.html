<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Syntaxable</title>
    <link rel="icon" type="image/png" href="/syntaxable.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
      html,
      body,
      #root {
        height: 100%;
        width: 100%;
        background: var(--bg-initial, #111);
      }

      body {
        margin: 0;
      }

      /* Initial loader - shown until React mounts */
      #initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg-initial, #111);
        z-index: 9999;
      }

      .loader-spinner {
        width: 24px;
        height: 24px;
        border: 2px solid var(--loader-ring, #333);
        border-top-color: var(--loader-spin, #888);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('app-theme') || 'dark';
          if (theme !== 'dark') {
            document.documentElement.setAttribute('data-theme', theme);
          }
        } catch (e) {}
      })();
    </script>
  </head>

  <body>
    <div id="root">
      <div id="initial-loader">
        <div class="loader-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
