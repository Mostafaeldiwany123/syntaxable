<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <meta name="theme-color" content="#09090b" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />

  <!-- Primary Meta Tags -->
  <title>Syntaxable | Collaborative Code Editor & Practice Platform</title>
  <meta name="title" content="Syntaxable | Collaborative Code Editor & Practice Platform" />
  <meta name="description"
    content="Syntaxable is a premium collaborative code editor and programming practice platform. Write, compile, and learn coding with friends globally in real-time." />
  <meta name="keywords"
    content="coding, collaborative coding, code editor, online compiler, practice programming, syntaxable, learn to code, algorithms, data structures, pair programming" />
  <meta name="author" content="Syntaxable" />
  <meta name="robots" content="index, follow" />

  <!-- Open Graph / Facebook / LinkedIn / Discord -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://syntaxable.org/" />
  <meta property="og:title" content="Syntaxable | Collaborative Code Editor & Practice" />
  <meta property="og:description"
    content="Syntaxable is a premium collaborative code editor and programming practice platform. Write, compile, and learn coding with friends globally in real-time." />
  <meta property="og:image" content="/syntaxable.png" />
  <meta property="og:site_name" content="Syntaxable" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://syntaxable.com/" />
  <meta property="twitter:title" content="Syntaxable | Collaborative Code Editor & Practice" />
  <meta property="twitter:description"
    content="Syntaxable is a premium collaborative code editor and programming practice platform. Write, compile, and learn coding with friends globally in real-time." />
  <meta property="twitter:image" content="/syntaxable.png" />

  <link rel="icon" type="image/png" href="/syntaxable.png" />
  <link rel="apple-touch-icon" href="/syntaxable.png" />
  <link rel="canonical" href="https://syntaxable.com/" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-initial: #09090b;
      --loader-ring: rgba(255, 255, 255, 0.1);
      --loader-spin: #3b82f6;
      --text-primary: #ffffff;
      --text-secondary: #a1a1aa;
    }

    html[data-theme='light'] {
      --bg-initial: #ffffff;
      --loader-ring: rgba(0, 0, 0, 0.1);
      --text-primary: #09090b;
      --text-secondary: #71717a;
    }

    html,
    body,
    #root {
      height: 100%;
      width: 100%;
      background-color: var(--bg-initial);
      margin: 0;
      padding: 0;
      font-family: 'Assistant', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Premium Initial Loader UI */
    #initial-loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: var(--bg-initial);
      background-image:
        radial-gradient(circle at center, rgba(59, 130, 246, 0.08) 0%, transparent 45%),
        linear-gradient(to bottom, transparent, rgba(0, 0, 0, 0.1));
      z-index: 9999;
      transition: opacity 0.2s ease-out;
    }

    .logo-wrapper {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 2rem;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(59, 130, 246, 0.25);
      object-fit: cover;
    }

    .logo-brand-text {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--text-primary) 0%, var(--text-secondary) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .spinner-container {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .loader-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--loader-ring);
      border-top-color: var(--loader-spin);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .loader-message {
      margin-top: 1.5rem;
      font-size: 14px;
      font-weight: 400;
      color: var(--text-secondary);
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }
  </style>
  <script>
    (function () {
      try {
        var theme = localStorage.getItem('app-theme') || 'dark';
        if (theme !== 'dark') {
          document.documentElement.setAttribute('data-theme', theme);
        }
      } catch (e) { }
    })();
  </script>
</head>

<body>
  <!-- Loader is moved outside of #root so React doesn't abruptly unmount it -->
  <div id="initial-loader">
    <div class="logo-wrapper">
      <img src="/syntaxable.png" alt="Syntaxable Logo" class="logo-icon" />
      <span class="logo-brand-text">Syntaxable</span>
    </div>
    <div class="spinner-container">
      <div class="loader-spinner"></div>
    </div>
    <div class="loader-message">
      Initializing Workspace
    </div>
  </div>
  
  <div id="root"></div>
  
  <script>
    // Fade out smoothly and then remove the loader gracefully once React connects to #root
    var observer = new MutationObserver(function() {
      var root = document.getElementById('root');
      if (root && root.children.length > 0) {
        var loader = document.getElementById('initial-loader');
        if (loader) {
          loader.style.opacity = '0';
          loader.style.pointerEvents = 'none';
          setTimeout(function() { loader.remove(); }, 200); // 200ms quick fade out
        }
        observer.disconnect();
      }
    });
    observer.observe(document.body, { childList: true, subtree: true });
  </script>
  
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
